<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #020617;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .box {
            background: #0f172a;
            padding: 30px;
            border-radius: 12px;
            width: 300px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Admin Login</h2>

    <input id="user" placeholder="Username">
    <input id="pass" placeholder="Password" type="password">

    <button onclick="login()">Login</button>
</div>

<script>
function login() {
    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;

    // simple hardcoded auth (for now)
    if (u === "admin" && p === "1234") {
        window.location.href = "dashboard.html";
    } else {
        alert("Invalid credentials");
    }
}
</script>

</body>
</html>
