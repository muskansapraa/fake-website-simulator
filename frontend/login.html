<!DOCTYPE html>
<html>
<head>
    <title>Instagram</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-box">
        <img src="assets/instagram-logo.jpg" width="150">
         <h1 style="font-family: cursive;">Instagram</h1>

    <p style="color:red; font-size:13px;">
        Suspicious login attempt. Please log in again.
    </p>

        <form onsubmit="handleLogin(event)">
            <input type="text" placeholder="Email or phone" required><br><br>
            
            <input type="password" placeholder="Password" required><br><br>
            <p style="font-size:12px; color:gray;">
    🔒 Secure connection
</p>

            <button type="submit">Log In</button>
        </form>
        <p style="color:#385185; font-size:14px; margin-top:10px;">
        Log in with Facebook
    </p>

    <p style="font-size:12px; color:gray;">
        Forgotten your password?
    </p>

    <p style="font-size:11px; color:gray; margin-top:15px;">
        Meta © 2026
    </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
